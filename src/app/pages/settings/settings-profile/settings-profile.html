<div *ngIf="profile$ | async as profile" class="space-y-6">

  <h2 class="text-xl font-semibold">Edit Profile</h2>

  <!-- Avatar -->
  <div class="relative w-20 h-20 flex items-center gap-4">
    <img *ngIf="profile.profilePicture; else defaultAvatar"
      [src]="profile.profilePicture"
      alt="Profile picture"
      class="w-20 h-20 rounded-full object-cover border"/>

    <!-- Default avatar -->
    <ng-template #defaultAvatar>
      <div class="w-20 h-20 rounded-full flex items-center justify-center text-white text-[40px] font-normal select-none"
          [ngStyle]="{ 'background-color': getAvatarColor(profile.username) }">
          <span class="relative -top-[1px] -right-[0.5px]">{{ getInitial(profile.username) }}</span>
      </div>
    </ng-template>

    <!-- Always present file input (hidden) -->
    <input type="file" accept="image/*" class="hidden" #fileInput (change)="onProfilePictureSelected($event)"/>

    <div class="absolute bottom-0 right-0 flex flex-col items-center text-sm">

      <!-- Remove button, slightly above pencil -->
      <button *ngIf="profileForm.value.profilePicture"
        type="button"
        (click)="confirmRemoveProfilePicture()"
        class="w-6 h-6 bg-red-600 text-white flex items-center justify-center rounded-full hover:bg-red-700 shadow -mb-1"
        title="Remove profile picture">
        <span class="relative -top-[1px]">✕</span>
      </button>

      <!-- Pencil / Change button -->
      <button type="button"
        (click)="fileInput.click()"
        class="w-6 h-6 bg-gray-900 text-white flex items-center justify-center rounded-full hover:bg-gray-700 shadow">
        <span class="relative -top-[1px]">✎</span>
      </button>
    </div>
  </div>

  <!-- Form -->
  <form [formGroup]="profileForm" class="space-y-4">

    <div>
      <label class="block text-sm font-medium">Display Name</label>
      <input formControlName="displayName"
             class="w-full border rounded p-2"/>
    </div>

    <div>
      <label class="block text-sm font-medium">Username</label>
      <input formControlName="username"
             class="w-full border rounded p-2"/>
      <!-- Current username hint -->
      <p class="text-gray-400 text-sm mt-1">
        Your current username {{ profile.username }} is available.
      </p>
      <div class="flex items-center gap-2 mt-1 min-h-[20px] text-sm leading-none">
        <!-- Spinner -->
        <div *ngIf="checkingUsername" 
          class="w-4 h-4 border-2 border-gray-300 border-t-gray-600 rounded-full animate-spin">
        </div>
        <ng-container *ngIf="usernameStatus$ | async as status">
          <!-- Format error -->
          <p *ngIf="status === 'invalid' || status === 'taken'"
            class="text-red-600 text-sm">
            Invalid or already taken username.
          </p>

          <!-- Available -->
          <p *ngIf="status === 'available'"
            class="text-green-600 text-sm">
            ✓ Username available
          </p>
        </ng-container>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium">Bio</label>
      <textarea formControlName="bio"
                class="w-full border rounded p-2"></textarea>
    </div>

    <!-- Actions -->
    <div class="flex gap-2">
      <button
        (click)="save()"
        [disabled]="!canSave"
        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 transition-colors duration-150 text-white rounded disabled:bg-gray-400 disabled:opacity-50 disabled:cursor-not-allowed">
        Save Changes
      </button>
    </div>

  </form>

  <!-- Crop Modal -->
  <div *ngIf="cropImageSrc" @overlayFade
       class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div @modalScale class="bg-white p-4 rounded-lg relative w-full max-w-sm h-auto flex flex-col items-center">
      <h2 class="text-lg font-bold mb-4">Adjust Profile Picture</h2>
      <div #cropCircle class="relative w-[264px] h-[264px] rounded-full overflow-hidden border-4 border-gray-200 shadow-inner touch-none"
        (mousedown)="startDrag($event)" (mousemove)="drag($event)" (mouseup)="endDrag()" (mouseleave)="endDrag()"
        (touchstart)="startDrag($event)" (touchmove)="drag($event)" (touchend)="endDrag()" (touchcancel)="endDrag()">
        <img
          [src]="cropImageSrc"
          class="absolute top-1/2 left-1/2 will-change-transform max-w-none"
          [style.width.px]="imageDisplayWidth"
          [style.height.px]="imageDisplayHeight"
          [style.transform]="
            'translate(-50%, -50%) translate(' + crop.x + 'px,' + crop.y + 'px) scale(' + crop.scale + ')'
          "
          draggable="false"
        />
      </div>
      <input
        type="range"
        [min]="minScale"
        max="3"
        step="0.01"
        [value]="crop.scale"
        (input)="onSliderChange($event)"
        class="mt-4 w-64"
      />
      <div class="mt-4 flex gap-2">
        <button (click)="saveCroppedProfilePicture()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Save</button>
        <button (click)="cancelCrop()" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Remove Profile Picture Confirmation -->
  <div *ngIf="showRemoveConfirm" @overlayFade
      class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div @modalScale class="bg-white p-4 rounded-lg w-full max-w-sm flex flex-col items-center">
      <h2 class="text-lg font-bold mb-4">Remove Profile Picture?</h2>
      <p class="text-gray-700 mb-4">This will revert your profile picture to the default avatar.</p>
      <div class="flex gap-2">
        <button (click)="removeProfilePicture()"
                class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
          Yes, Remove
        </button>
        <button (click)="cancelRemoveProfilePicture()"
                class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">
          Cancel
        </button>
      </div>
    </div>
  </div>

</div>
