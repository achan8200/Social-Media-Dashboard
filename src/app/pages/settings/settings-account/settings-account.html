<div class="max-w-2xl space-y-8">

  <!-- Header -->
  <div class="space-y-2">

    <h2 class="text-xl font-semibold text-[var(--text)]">
      Account
    </h2>

    <p class="text-sm text-[var(--text)] opacity-60">
      Permanently delete your account and all associated data.
    </p>

  </div>

  <!-- Danger Card -->
  <div class="rounded-3xl border border-red-500/20
  bg-red-500/5 backdrop-blur-xl
    shadow-xl p-6 md:p-8 space-y-6"
  >

    <div class="space-y-1">
      <h3 class="text-lg font-semibold text-red-500">
        Danger Zone
      </h3>

      <p class="text-sm text-[var(--text)] opacity-60">
        This action cannot be undone.
      </p>
    </div>

    <div class="space-y-2">

      <label class="text-sm font-medium text-[var(--text)]">
        Confirm Password
      </label>

      <input type="password"
        [(ngModel)]="password"
        placeholder="Enter password"
        class="w-full rounded-2xl bg-red-500/5 border border-red-500/20 text-[var(--text)] px-4 py-3 outline-none
          focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
      />

    </div>

    <div class="flex items-center justify-between gap-4">

      <button (click)="openDeleteModal()"
        [disabled]="loading || !password.trim()"
        class="px-5 py-3 rounded-2xl bg-red-600 text-white
          font-medium shadow-lg hover:bg-red-700
          transition-all duration-200 disabled:opacity-40"
      >
        {{ loading ? 'Deleting...' : 'Delete Account' }}
      </button>

      <p *ngIf="error" class="text-sm text-red-500">
        {{ error }}
      </p>

    </div>

  </div>

  <app-confirm-modal
    *ngIf="showDeleteModal"
    title="Delete Account?"
    confirmText="Delete"
    cancelText="Cancel"
    (confirmed)="confirmDeleteAccount()"
    (cancelled)="closeDeleteModal()"
  >
    <div class="space-y-3">
      <p class="text-sm text-[var(--text)] opacity-60">
        This action cannot be undone.
      </p>

      <p class="text-sm text-[var(--text)] opacity-60">
        Your posts, messages, notifications, groups,
        and account data will be permanently deleted.
      </p>
    </div>
  </app-confirm-modal>

</div>
