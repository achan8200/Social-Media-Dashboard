<div class="flex-1 p-4 flex flex-col relative text-[var(--text)]">
  <!-- Header with Mark all as read button and unread badge -->
  <div class="flex justify-between items-center mb-4">
    <div class="flex items-center space-x-2">
      <h1 class="text-2xl font-semibold">Notifications</h1>
      <span
        *ngIf="(unreadCount$ | async) as count"
        class="inline-flex items-center justify-center h-6 w-6 rounded-full bg-red-500 text-white text-sm font-semibold"
        [class.bounce-badge]="newNotification"
        [hidden]="count === 0">
        <span class="relative -top-[0.5px] -right-[0.5px]">{{ count }}</span>
      </span>
    </div>

    <button
      class="font-medium text-white bg-[var(--primary)] hover:bg-[var(--primary-hover)] hover:scale-105 transition-all duration-200 px-4 py-2 rounded-2xl shadow-lg"
      (click)="markAllRead()">
      Mark all as read
    </button>
  </div>

  <!-- Scrollable notifications -->
  <div class="relative flex-1 overflow-y-auto scroll-smooth rounded-3xl border border-[var(--border)]
    bg-[var(--card)] backdrop-blur-xl shadow-xl px-5 pb-5 pt-2"
    #scrollContainer
    (scroll)="onScroll($event)">

    <!-- Top Fade -->
    <div class="pointer-events-none absolute top-0 left-0 w-full h-10 z-10
      bg-gradient-to-b from-[var(--card)] to-transparent transition-opacity duration-200"
      [class.opacity-0]="!showTopFade"
      [class.opacity-100]="showTopFade"
    >
    </div>

    <ng-container *ngIf="notificationsByDay$ | async as notificationsByDay">
      <ng-container *ngFor="let dayEntry of notificationsByDay | keyvalue: sortDays">
        <!-- Day header -->
        <div class="mt-3 mb-1 text-[var(--text)] opacity-40 text-xs font-semibold uppercase">
          {{ dayEntry.key }}
        </div>

        <ul class="space-y-2">
          <li *ngFor="let group of dayEntry.value">
            <app-notification-item [notifications]="group"></app-notification-item>
          </li>
        </ul>
      </ng-container>
    </ng-container>

    <!-- Bottom Fade -->
    <div
      class="pointer-events-none absolute bottom-0 left-0 w-full h-10 z-10
        bg-gradient-to-t from-[var(--card)] to-transparent transition-opacity duration-200"
      [class.opacity-0]="!showBottomFade"
      [class.opacity-100]="showBottomFade"
    >
    </div>
  </div>
</div>
