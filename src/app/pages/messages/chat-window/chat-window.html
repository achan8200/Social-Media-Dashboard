<div class="flex flex-col flex-1 min-h-0">

  <!-- Empty State -->
  <div *ngIf="!threadId" class="flex flex-1 items-center justify-center text-gray-400">
    Select a conversation
  </div>

  <!-- Messages -->
  <div *ngIf="threadId" class="flex flex-col flex-1">

    <!-- Message List -->
		<div #scrollContainer (scroll)="onScroll()" 
				class="flex-1 overflow-y-auto px-4 py-2 min-h-0 flex flex-col-reverse space-y-2">
			<div *ngIf="messages$ | async as messages">
				<ng-container *ngFor="let msg of messages; let i = index">

					<!-- Date Separator -->
					<div *ngIf="shouldShowDateSeparator(messages, i)"
							class="flex justify-center my-3 sticky top-0 z-10 transition-opacity duration-300 ease-in-out">
						<div class="bg-gray-200 text-gray-600 text-xs px-3 py-1 rounded-full">
							{{ formatDateSeparator(msg.createdAt) }}
						</div>
					</div>

					<!-- Message -->
					<div [ngClass]="msg.senderId === currentUserId ? 'text-right' : 'text-left'">
						
						<!-- Bubble -->
						<div [ngClass]="getBubbleClasses(msg, messages, i)">
							<span class="relative -top-[1px] whitespace-pre-wrap break-words">{{ msg.text }}</span>
						</div>

						<!-- Timestamp BELOW the bubble -->
						<div [ngClass]="msg.senderId === currentUserId ? 'text-right' : 'text-left'">
							<div [ngClass]="shouldRoundBottom(messages, i) ? '-mt-1' : 'mt-0.5'">
								<span 
									*ngIf="shouldShowTimestamp(messages, i)" 
									class="text-[0.65rem] text-gray-400"
								>
									{{ msg.createdAt?.toDate() | date:'shortTime' }}
								</span>
							</div>
						</div>
						
					</div>

				</ng-container>
			</div>
		</div>

		<button
			*ngIf="showNewMessageIndicator"
			(click)="scrollToBottom()"
			class="absolute bottom-20 left-1/2 -translate-x-1/2 bg-blue-500 text-white px-3 py-1 rounded-full shadow hover:bg-blue-600 transition">
			New messages ↓
		</button>

    <!-- Input -->
    <div class="p-3 border-t flex space-x-2">
      <textarea
				#messageInput
				[(ngModel)]="newMessage"
				(keydown.enter)="handleEnter($event)"
				(input)="autoResize()"
				placeholder="Type a message..."
				rows="1"
				class="flex-1 border rounded px-3 py-1.5 resize-none overflow-hidden">
			</textarea>

      <button
        (click)="sendMessage()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
        Send
      </button>
    </div>
  </div>
</div>
