<div class="flex flex-col flex-1 min-h-0">

  <!-- Empty State -->
  <div *ngIf="!threadId" class="flex flex-1 items-center justify-center text-gray-400">
    Select a conversation
  </div>

  <!-- Messages -->
  <div *ngIf="threadId" class="flex flex-col flex-1">

    <!-- Message List -->
    <div #scrollContainer (scroll)="onScroll()" class="flex-1 overflow-y-auto p-4 space-y-2 min-h-0 flex flex-col">
			<div class="mt-auto space-y-2">
				<div *ngFor="let msg of messages$ | async"
						[ngClass]="msg.senderId === currentUserId ? 'text-right' : 'text-left'">
					<div class="inline-block px-3 py-2 rounded-2xl"
							[ngClass]="msg.senderId === currentUserId 
								? 'bg-blue-500 text-white' 
								: 'bg-gray-200 text-gray-800'">
						<span class="relative -top-[0.5px]">{{ msg.text }}</span>
					</div>
				</div>
			</div>
    </div>

		<button
			*ngIf="showNewMessageIndicator"
			(click)="scrollToBottom()"
			class="absolute bottom-20 left-1/2 -translate-x-1/2 bg-blue-500 text-white px-3 py-1 rounded-full shadow hover:bg-blue-600 transition">
			New messages ↓
		</button>

    <!-- Input -->
    <div class="p-3 border-t flex space-x-2">
      <textarea
				#messageInput
				[(ngModel)]="newMessage"
				(keydown.enter)="handleEnter($event)"
				(input)="autoResize()"
				placeholder="Type a message..."
				rows="1"
				class="flex-1 border rounded px-3 py-1.5 resize-none overflow-hidden">
			</textarea>

      <button
        (click)="sendMessage()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
        Send
      </button>
    </div>
  </div>
</div>
