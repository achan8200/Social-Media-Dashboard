<div class="flex flex-col flex-1 min-h-0 relative">

  <!-- Empty State -->
  <div *ngIf="!threadId" class="flex flex-1 items-center justify-center text-gray-400">
    Select a conversation
  </div>

  <!-- Messages -->
  <div *ngIf="threadId" class="flex flex-col flex-1">

    <!-- Message List -->
		<div #scrollContainer (scroll)="onScroll()" 
				class="flex-1 overflow-y-auto px-4 py-2 min-h-0 flex flex-col-reverse space-y-2">
			<div *ngIf="messages$ | async as messages">
				<ng-container *ngFor="let msg of messages; let i = index">

					<!-- Date Separator -->
					<div *ngIf="shouldShowDateSeparator(messages, i)"
							class="flex justify-center my-3 sticky top-0 z-10 transition-opacity duration-300 ease-in-out">
						<div class="bg-gray-200 text-gray-600 text-xs px-3 py-1 rounded-full">
							{{ formatDateSeparator(msg.createdAt) }}
						</div>
					</div>

					<!-- Message -->
					<div [ngClass]="msg.senderId === currentUserId ? 'text-right' : 'text-left'">
						
						<!-- Bubble -->
						<div [ngClass]="getBubbleClasses(msg, messages, i)">
							<span class="relative -top-[1px] whitespace-pre-wrap break-words">{{ msg.text }}</span>
						</div>

						<!-- Timestamp BELOW the bubble -->
						<div [ngClass]="msg.senderId === currentUserId ? 'text-right' : 'text-left'">
							<div [ngClass]="shouldRoundBottom(messages, i) ? '-mt-1' : 'mt-0.5'">
								<span 
									*ngIf="shouldShowTimestamp(messages, i)" 
									class="text-[0.65rem] text-gray-400"
								>
									{{ msg.createdAt?.toDate() | date:'shortTime' }}
								</span>
							</div>
						</div>
						
					</div>

				</ng-container>
			</div>
		</div>

		<button
			*ngIf="showNewMessageIndicator"
			(click)="scrollToBottom()"
			class="absolute bottom-20 left-1/2 -translate-x-1/2 bg-blue-500 text-white px-3 py-1 rounded-full shadow hover:bg-blue-600 transition">
			New messages ↓
		</button>

		<!-- Typing Indicator -->
    <div *ngIf="(typing$ | async) as typing" class="absolute bottom-14 left-0 w-full px-4">
      <div *ngIf="(participants$ | async) as participants">
        <div *ngIf="isOtherUserTyping(typing)" 
             class="bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full shadow text-sm text-gray-500 italic flex items-center gap-2 max-w-xs">
          
          <!-- Text -->
          <span>{{ getTypingText(typing, participants) }}</span>

          <!-- Animated dots -->
          <span class="flex gap-[3px]">
            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce [animation-delay:0ms]"></span>
            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce [animation-delay:150ms]"></span>
            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce [animation-delay:300ms]"></span>
          </span>

        </div>
      </div>
    </div>

    <!-- Input Area -->
		<div class="p-3 border-t flex items-end space-x-2 relative">

			<!-- Textarea + Emoji Wrapper -->
			<div class="flex-1 relative">
				
				<!-- Textarea -->
				<textarea
					#messageInput
					[(ngModel)]="newMessage"
					(keydown.enter)="handleEnter($event)"
					(input)="onInputChange($event)"
					placeholder="Type a message..."
					rows="1"
					class="w-full border rounded px-3 py-1.5 pr-10 resize-none overflow-hidden">
				</textarea>

				<div #emojiPickerContainer>
					<!-- Emoji Button -->
					<button
						type="button"
						(click)="toggleEmojiPicker($event)"
						(mousedown)="$event.preventDefault()"
						class="absolute right-2 top-1/2 -translate-y-1/2 p-1 hover:scale-105">
						<img src="assets/icons/emoji-1.svg" alt="Emoji" class="w-5 h-5" style="filter: invert(0.6);"/>
					</button>

					<!-- Emoji Picker -->
					<div *ngIf="showEmojiPicker" 
							class="absolute bottom-full mb-2 right-0 z-50 shadow-lg">
						<emoji-mart
							[perLine]="9"
							[emojiSize]="24"
							(emojiSelect)="addEmoji($event)">
						</emoji-mart>
					</div>
				</div>
			</div>

			<!-- Send Button -->
			<button
				(click)="sendMessage()"
				class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
				Send
			</button>
		</div>
  </div>
</div>
