<div class="flex flex-col h-full">

  <!-- Empty State -->
  <div *ngIf="!threadId" class="flex-1 flex items-center justify-center text-gray-400">
    Select a conversation
  </div>

  <!-- Messages -->
  <div *ngIf="threadId" class="flex flex-col flex-1">

    <!-- Message List -->
    <div class="flex-1 overflow-y-auto p-4 space-y-2">

      <div *ngFor="let msg of messages$ | async"
           [ngClass]="msg.senderId === currentUserId ? 'text-right' : 'text-left'">

        <div class="inline-block px-3 py-2 rounded-lg"
             [ngClass]="msg.senderId === currentUserId 
               ? 'bg-blue-500 text-white' 
               : 'bg-gray-200 text-gray-800'">

          {{ msg.text }}
        </div>

      </div>

    </div>

    <!-- Input -->
    <div class="p-3 border-t flex space-x-2">
      <input
        [(ngModel)]="newMessage"
        placeholder="Type a message..."
        class="flex-1 border rounded px-3 py-2" />

      <button
        (click)="sendMessage()"
        class="bg-blue-500 text-white px-4 py-2 rounded">
        Send
      </button>
    </div>

  </div>

</div>
