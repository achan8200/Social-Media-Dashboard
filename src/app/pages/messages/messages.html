<div class="flex h-[calc(100vh-64px)] bg-white">

  <!-- LEFT: Threads -->
  <div class="w-1/3 border-r overflow-y-auto">
    <app-thread-list (selectThread)="onSelectThread($event)"></app-thread-list>
  </div>

  <!-- RIGHT: Chat -->
  <div class="flex-1 flex flex-col">
    <app-chat-window [threadId]="selectedThreadId"></app-chat-window>
  </div>

</div>
