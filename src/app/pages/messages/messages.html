<!-- messages.html -->
<div class="flex rounded shadow flex-col h-[calc(100vh-100px)] max-h-[800px] bg-white mx-auto">

  <!-- Main content -->
  <div class="flex flex-1 overflow-hidden min-h-0">

    <!-- LEFT: Threads -->
    <div class="w-1/3 border-r overflow-y-auto min-h-0">
      <app-thread-list [selectedThreadId]="selectedThreadId" (selectThread)="onSelectThread($event)"></app-thread-list>
    </div>

    <!-- RIGHT: Chat -->
    <app-chat-window 
      class="flex-1 flex flex-col min-h-0"
      [threadId]="selectedThreadId">
    </app-chat-window>

  </div>
</div>
