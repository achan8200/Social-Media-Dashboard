<div class="flex-1 p-4 max-w-5xl mx-auto">
  <h1 class="text-2xl font-semibold mb-4 text-[var(--text)]">
    <ng-container *ngIf="isOwnProfile; else otherUser">
      Connections
    </ng-container>

    <ng-template #otherUser>
      <ng-container *ngIf="profileUsername$ | async as profileUsername; else loading">
        {{ profileUsername }}{{ profileUsername.endsWith('s') ? '\'' : "'s" }} connections
      </ng-container>
      <ng-template #loading>
        Connections
      </ng-template>
    </ng-template>
  </h1>

  <ng-container *ngIf="tab$ | async as activeTab">

    <!-- Tabs -->
    <div class="flex gap-2 mb-4">
      <button
        [routerLink]="[]"
        [queryParams]="{ tab: 'followers' }"
        [ngClass]="activeTab === 'followers'
          ? 'bg-[var(--primary)] text-white'
          : 'bg-[var(--card)] text-[var(--text)] hover:bg-[var(--hover)] border border-[var(--border)]'"
        class="px-4 py-2 rounded-lg transition">
        Followers
      </button>

      <button
        [routerLink]="[]"
        [queryParams]="{ tab: 'following' }"
        [ngClass]="activeTab === 'following'
          ? 'bg-[var(--primary)] text-white'
          : 'bg-[var(--card)] text-[var(--text)] hover:bg-[var(--hover)] border border-[var(--border)]'"
        class="px-4 py-2 rounded-lg transition">
        Following
      </button>
    </div>

    <!-- Search -->
    <input
      type="text"
      placeholder="Search connections"
      class="w-full rounded-lg p-2 mb-4 bg-[var(--card)] border border-[var(--border)]
        text-[var(--text)] placeholder:text-[var(--text)] placeholder:opacity-50
        focus:ring-2 focus:ring-[var(--primary)] outline-none"
      (input)="onSearch($any($event.target).value)"
    />

    <ng-container *ngIf="connections$ | async as users">
      <ng-container *ngIf="users.length > 0; else noConnections">
      <!-- User Cards Grid -->
      <div class="grid gap-4 sm:grid-cols-1 md:grid-cols-2">
        <div *ngFor="let user of users; trackBy: trackByUid"
          class="flex items-center justify-between p-4
            bg-[var(--card)]
            border border-[var(--border)]
            rounded-xl shadow-sm
            hover:bg-[var(--hover)]
            hover:shadow-md
            transition-all duration-200
            transform hover:-translate-y-1">
          
              <!-- Avatar + Info -->
              <a class="flex items-center gap-4 flex-1 min-w-0" [routerLink]="['/profile', user.userId$ | async]">
                <div class="w-14 h-14 rounded-full bg-[var(--bg)] border border-[var(--border)] overflow-hidden flex flex-shrink-0 items-center justify-center">
                  <app-avatar
                    [username]="user.usernameCache || (user.username$ | async)"
                    [imageUrl]="user.profilePictureCache || (user.profilePicture$ | async)"
                    class="transform scale-[1.75] origin-center">
                  </app-avatar>
                </div>

                <div class="flex flex-col truncate min-w-0">
                  <p class="font-semibold text-[var(--text)] truncate">{{ user.displayNameCache || (user.displayName$ | async) }}</p>
                  <p class="text-sm text-[var(--text)] opacity-60 truncate">@{{ user.usernameCache || (user.username$ | async) }}</p>
                </div>
              </a>

              <!-- Action Buttons -->
              <div class="flex items-center gap-2">
                <ng-container *ngIf="isOwnProfile">
                  <!-- Followers tab: Follow + Remove -->
                  <ng-container *ngIf="activeTab === 'followers'">
                    <button
                      *ngIf="user.following === false"
                      (click)="follow(user.uid)"
                      class="px-3 py-1 text-sm rounded-lg text-white bg-[var(--primary)] hover:bg-[var(--primary-hover)] transition">
                      Follow
                    </button>

                    <button
                      (click)="removeFollower(user.uid)"
                      class="px-2 py-1 text-sm rounded-lg text-[var(--text)] opacity-70 hover:bg-[var(--hover)] transition">
                      ✕
                    </button>
                  </ng-container>

                  <!-- Following tab: Unfollow -->
                  <ng-container *ngIf="activeTab === 'following'">
                    <button
                      (click)="unfollow(user.uid)"
                      class="px-2 py-1 text-sm rounded-lg text-[var(--text)] opacity-70 hover:bg-[var(--hover)] transition">
                      ✕
                    </button>
                  </ng-container>
                </ng-container>
              </div>
        </div>
      </div>
      </ng-container>
    </ng-container>

    <!-- Empty State -->
    <ng-template #noConnections>
      <p class="text-[var(--text)] opacity-60 text-center mt-10">
        No {{ activeTab }} found.
      </p>
    </ng-template>
  </ng-container>
</div>
