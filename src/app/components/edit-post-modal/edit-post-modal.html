<div
  *ngIf="visible"
  @overlayFade
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
>

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

  <!-- Modal -->
  <div
    @modalScale
    class="relative w-full max-w-xl
           rounded-3xl border border-[var(--border)]
           bg-[var(--card)] backdrop-blur-2xl
           shadow-2xl p-6
           text-[var(--text)]"
  >

    <!-- Header -->
    <div class="flex items-start justify-between gap-4 mb-5">

      <div class="flex items-center gap-3">

        <app-avatar
          [username]="username$ | async"
          [imageUrl]="userAvatar$ | async">
        </app-avatar>

        <div>
          <h3 class="font-semibold text-lg">
            Edit Post
          </h3>

          <p class="text-sm text-[var(--text)] opacity-70">
            Update your caption.
          </p>
        </div>

      </div>

      <!-- Close -->
      <button
        (click)="onCancel()"
        class="w-9 h-9 rounded-full
               hover:bg-[var(--hover)]/50
               transition flex items-center justify-center"
      >
        ✕
      </button>

    </div>

    <!-- Caption -->
    <div class="space-y-2">

      <textarea
        [(ngModel)]="editedCaption"
        rows="5"
        placeholder="Update your caption..."
        class="w-full rounded-2xl bg-[var(--form)] border border-[var(--border)]
          px-4 py-3 outline-none resize-none text-[var(--text)] placeholder:text-[var(--text)]/40
          focus:ring-2 focus:ring-[var(--primary)] transition"
      ></textarea>

    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 mt-6">

      <button
        (click)="onCancel()"
        class="px-5 py-2.5 rounded-2xl border border-[var(--border)] bg-[var(--bg)] hover:bg-[var(--hover)] transition-all duration-200"
      >
        Cancel
      </button>

      <button
        (click)="onUpdate()"
        class="px-5 py-2.5 rounded-2xl bg-[var(--primary)] text-white shadow-lg hover:bg-[var(--primary-hover)] transition-all duration-200"
      >
        Update
      </button>

    </div>

  </div>
</div>
