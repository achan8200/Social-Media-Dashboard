<div *ngIf="visible" @overlayFade class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">

  <!-- Modal Card -->
  <div @modalScale class="bg-white w-full max-w-lg rounded-xl shadow-xl p-6">

    <!-- Author info -->
    <div class="flex items-center space-x-3 mb-4">
      <app-avatar [username]="username$ | async" [imageUrl]="userAvatar$ | async"></app-avatar>
      <h3 class="font-semibold text-gray-800">{{ username$ | async }}</h3>
    </div>

    <!-- Editable caption -->
    <textarea
      [(ngModel)]="editedCaption"
      class="w-full border rounded p-2 text-gray-700 resize-none"
      rows="4"
      placeholder="Update your caption..."></textarea>

    <!-- Buttons -->
    <div class="flex justify-end space-x-3 mt-4">
      <button
        (click)="onCancel()"
        class="px-4 py-2 rounded-lg border text-gray-700 hover:bg-gray-100">
        Cancel
      </button>
      <button
        (click)="onUpdate()"
        class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700">
        Update
      </button>
    </div>

  </div>
</div>
