<div *ngIf="isVisible" @overlayFade class="fixed inset-0 flex items-center justify-center z-50 p-4">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/60"></div>

  <!-- Modal Card -->
  <div @modalScale class="relative border border-[var(--border)] bg-[var(--card)] backdrop-blur-2xl 
    shadow-2xl w-full max-w-lg rounded-3xl p-4 flex flex-col space-y-4 text-[var(--text)]">

    <div class="flex justify-between items-center">
       <div class="space-y-1">
        <h3 class="font-semibold text-lg">
          {{ group ? ('Create Post • ' + group.name) : 'Create Post' }}
        </h3>
      </div>
      <button (click)="onCancel()">✕</button>
    </div>

    <!-- Caption Area -->
    <textarea #captionTextarea
      [(ngModel)]="caption"
      (input)="adjustCaptionHeight()"
      placeholder="What's on your mind?" 
      class="w-full bg-[var(--form)] border border-[var(--border)] rounded-2xl p-2 overflow-y-hidden outline-none resize-none
        text-[var(--text)] placeholder:text-[var(--text)]/40
        focus:ring-2 focus:ring-[var(--primary)] transition"
      rows="4"
      (keydown)="handlePostKeydown($event)"></textarea>

    <!-- File Input -->
    <label *ngIf="selectedMedia.length < MAX_MEDIA_ITEMS"
      class="w-full border border-[var(--border)] rounded-lg p-2 cursor-pointer bg-[var(--form)] text-[var(--text)] hover:bg-[var(--hover)] transition flex items-center justify-center">
        Browse Files
        <input type="file" multiple (change)="onFileChange($event)" class="hidden" />
    </label>

    <!-- Media Counter -->
    <p class="text-sm text-[var(--text)] opacity-50 text-right">
      {{ selectedMedia.length }}/{{ MAX_MEDIA_ITEMS }} media selected
    </p>

    <!-- Preview Grid -->
    <div *ngIf="selectedMedia.length > 0"
      class="max-h-72 overflow-y-auto pr-1 mt-2">
  
      <div
          *ngIf="selectedMedia.length > 0"
          cdkDropList
          (cdkDropListDropped)="drop($event)"
          [cdkDropListDisabled]="isUploading"
          class="grid grid-cols-3 gap-2">
        <div *ngFor="let media of selectedMedia; let i = index"
              cdkDrag
              [cdkDragDisabled]="isUploading"
              class="relative border rounded overflow-hidden cursor-move">
              
          <button *ngIf="media.progress < 100"
                  (click)="removeMedia(i)"
                  class="absolute top-1 right-1 bg-black bg-opacity-60 text-white text-xs px-1 rounded">✕</button>

          <img *ngIf="media.file.type.startsWith('image')" 
              [src]="media.previewUrl"
              class="w-full h-24 object-cover transition-all duration-300"
              [class.blur-sm]="media.progress > 0 && media.progress < 100" />
          <video *ngIf="media.file.type.startsWith('video')" 
              [src]="media.previewUrl"
              class="w-full h-24 object-cover transition-all duration-300"
              [class.blur-sm]="media.progress > 0 && media.progress < 100"
              muted></video>

          <div *ngIf="media.progress > 0 && media.progress < 100"
              class="absolute inset-0 flex items-center justify-center bg-black/30 text-white text-xs font-medium">
              Uploading {{media.progress}}%
          </div>

          <div *ngIf="media.progress > 0 && media.progress < 100" class="absolute bottom-0 left-0 w-full bg-gray-200 h-1">
            <div class="bg-[var(--primary)] h-1 transition-all duration-150 ease-linear" [style.width.%]="media.progress"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex justify-end space-x-2">
      <button (click)="onCancel()" [disabled]="isUploading" 
            class="px-5 py-2.5 rounded-2xl
               border border-[var(--border)]
               bg-[var(--bg)] hover:bg-[var(--hover)]
               transition-all duration-200
               disabled:opacity-40 disabled:cursor-not-allowed">Cancel</button>
      <button (click)="onCreate()" [disabled]="isPostDisabled"
            class="px-5 py-2.5 rounded-2xl
               bg-[var(--primary)] text-white
               shadow-lg
               hover:bg-[var(--primary-hover)]
               transition-all duration-200
               disabled:opacity-40
               disabled:hover:scale-100
               disabled:cursor-not-allowed">Post</button>
    </div>

  </div>
</div>
