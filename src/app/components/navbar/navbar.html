<nav class="bg-white shadow px-6 py-3 flex justify-between items-center">
  <h1 class="text-2xl font-bold text-blue-600 whitespace-nowrap">Social Dashboard</h1>

  <div class="flex-1 flex justify-center px-6">
    <div #searchContainer class="relative w-full max-w-xl">

      <!-- Search Bar -->
      <div class="flex items-center border rounded-lg overflow-hidden bg-white shadow-sm">

        <!-- Dropdown (Search Type) -->
        <button
          (click)="toggleSearchTypeDropdown($event)"
          class="ml-[2.5px] px-3 py-2 bg-gray-100 text-sm hover:bg-gray-200 flex items-center gap-1 rounded-lg"
        >
          {{ searchType === 'user' ? 'User' : 'Group' }}
          <span>▾</span>
        </button>

        <!-- Input -->
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (input)="onSearchChange()"
          (focus)="showResults = true"
          placeholder="Search"
          class="flex-1 px-3 py-2 outline-none"
        />
      </div>

      <!-- Search Type Dropdown -->
      <div *ngIf="showSearchTypeDropdown"
           class="absolute left-0 mt-1 w-32 bg-white border rounded-lg shadow z-50 overflow-hidden animate-slide-down">

        <button
          (click)="setSearchType('user')"
          class="w-full text-left px-3 py-2 hover:bg-gray-100">
          Search User
        </button>

        <button
          (click)="setSearchType('group')"
          class="w-full text-left px-3 py-2 hover:bg-gray-100">
          Search Group
        </button>
      </div>

      <!-- Results Dropdown -->
      <div *ngIf="showResults && searchQuery.trim() && (results$ | async) as results"
           class="absolute left-0 right-0 mt-2 bg-white border rounded-lg shadow z-50 max-h-80 overflow-y-auto">

        <ng-container *ngIf="results.length; else noResults">
          <button
            *ngFor="let item of results"
            (click)="goToResult(item)"
            class="w-full text-left px-4 py-2 hover:bg-gray-100">

            <div class="flex items-center gap-3">

              <!-- Avatar -->
              <app-avatar
                [imageUrl]="item.imageUrl"
                [username]="item.username || item.name"
                size="sm">
              </app-avatar>

              <!-- Text -->
              <div class="flex flex-col">
                <span class="text-sm font-medium text-gray-900">
                  {{ searchType === 'user' ? item.displayName : item.name }}
                </span>

                <span class="text-xs text-gray-400">
                  {{ searchType === 'user' ? '@' + item.username : 'Group' }}
                </span>
              </div>

            </div>
          </button>
        </ng-container>

        <ng-template #noResults>
          <div class="px-4 py-2 text-gray-400 text-sm">
            No results
          </div>
        </ng-template>

      </div>

    </div>
  </div>

  <div class="flex items-center space-x-4">

    <!-- Notifications Button -->
    <div *ngIf="!(isGuest$ | async)" class="relative flex-shrink-0 lg:hidden">
      <ng-container *ngIf="unreadCount$ | async as unreadCount">
        <button 
          (click)="toggleNotifications(); $event.stopPropagation()"
          class="relative p-2 rounded hover:bg-gray-100"
          [title]="unreadCount > 0 ? unreadCount + ' unread notifications' : ''">
          <img 
            src="assets/icons/notification.svg"
            alt="Notifications"
            class="w-5 h-5"
          />
          <!-- Unread Badge -->
          <span 
            class="absolute -top-1 -right-1 h-4 w-4 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center"
            [class.bounce-badge]="newNotification"
            [hidden]="unreadCount === 0">
            {{ unreadCount }}
          </span>
        </button>
      </ng-container>

      <!-- If async has not emitted yet, show button with no badge -->
      <ng-container *ngIf="!(unreadCount$ | async)">
        <button 
          (click)="toggleNotifications(); $event.stopPropagation()"
          class="relative p-2 rounded hover:bg-gray-100">
          <img 
            src="assets/icons/notification.svg"
            alt="Notifications"
            class="w-5 h-5"
          />
        </button>
      </ng-container>

      <!-- Notifications Dropdown -->
      <div *ngIf="showNotifications"
          @dropdownAnimation
          class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg z-50 max-h-[70vh] flex flex-col border border-gray-200">

        <!-- Header -->
        <div class="px-4 py-3 border-b border-gray-200">
          <span class="font-semibold text-gray-700">Notifications</span>
        </div>

        <div class="relative">
          <!-- Scrollable Notifications Content -->
          <div class="relative max-h-[40vh] pb-2 flex-1 overflow-y-auto scroll-smooth">
            <!-- Grouped Notifications by Day -->
            <ng-container *ngIf="notificationsByDay$ | async as notificationsByDay">
              <ng-container *ngFor="let dayEntry of notificationsByDay | keyvalue: sortDays">
                
                <!-- Day header -->
                <div class="px-4 mt-3 mb-1 text-gray-400 text-xs font-semibold uppercase">
                  {{ dayEntry.key }}
                </div>

                <ul class="space-y-2 px-2">
                  <li *ngFor="let group of dayEntry.value">
                    <app-notification-item [notifications]="group"></app-notification-item>
                  </li>
                </ul>

              </ng-container>
            </ng-container>
          </div>
          <!-- Bottom Fade Overlay -->
          <div class="pointer-events-none absolute bottom-0 left-0 w-full h-8 bg-gradient-to-t from-white to-transparent"></div>
        </div>

        <!-- Sticky Mark all as read -->
        <div class="sticky bottom-0 bg-white p-3 flex justify-end border-t border-gray-200">
          <button class="text-xs text-blue-500 hover:underline" (click)="markAllRead()">
            Mark all as read
          </button>
        </div>
      </div>
    </div>

    <!-- Profile / Settings / Logout -->
    <button (click)="goToProfile()" class="text-gray-700 hover:text-blue-600">Profile</button>
    <button (click)="goToSettings()" class="text-gray-700 hover:text-blue-600">Settings</button>
    <button (click)="logout()" class="text-gray-700 hover:text-blue-600">Logout</button>

  </div>
</nav>
