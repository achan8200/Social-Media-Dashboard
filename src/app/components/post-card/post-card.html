<div #postRef [attr.data-id]="post?.id" (click)="onPostClick()" class="cursor-pointer">
  <div class="border rounded mb-6 bg-white shadow-sm overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between p-4 relative">
      <!-- Left: Avatar + Username -->
      <div class="flex items-center space-x-3">
        <app-avatar [username]="username$ | async" [imageUrl]="userAvatar$ | async"></app-avatar>
        <h3 class="font-normal text-gray-800">{{ username$ | async }}</h3>
      </div>

      <!-- Right: New Badge + Menu Button -->
      <div class="flex items-center space-x-2">
        <!-- New Badge -->
        <span *ngIf="post?.isNew"
              class="text-xs text-white bg-red-500 rounded-full px-2 py-0.5 transition-opacity duration-1000 ease-in-out"
              [class.opacity-0]="post?.fadingOut">
          New
        </span>

        <!-- Menu Button (only if author) -->
        <div *ngIf="isAuthor" class="relative">
          <button 
            (click)="toggleMenu($event)"
            [class.bg-gray-300]="menuOpen"
            class="text-gray-600 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 hover:text-black transition relative">
            <span class="relative -top-[1px]">⋯</span>
          </button>

          <div *ngIf="menuOpen"
              class="absolute right-0 mt-2 w-40 bg-white border rounded shadow-lg z-50">
            <button (click)="onEdit($event)" class="block w-full text-left px-4 py-2 hover:bg-gray-100">
              Edit Post
            </button>
            <button (click)="onDelete($event)" class="block w-full text-left px-4 py-2 text-red-600 hover:bg-gray-100">
              Delete Post
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Media Preview -->
    <div *ngIf="post?.media?.length" class="bg-black relative flex justify-center items-center">
        <ng-container *ngIf="firstMedia as media">
            <img *ngIf="media.type === 'image'" [src]="media.url" class="w-full max-h-[500px] object-cover"/>
            <video 
                #feedVideo
                *ngIf="media.type === 'video'" 
                class="w-full max-h-[500px] object-cover"
                [poster]="media.thumbnail"
                muted
                loop
                playsinline
                preload="metadata"
                disablePictureInPicture>
                <source [src]="media.url" type="video/mp4" />
            </video>
        </ng-container>
    </div>

    <!-- Caption -->
    <div class="p-4">
      <p class="text-gray-700">{{ post?.caption }}</p>

      <!-- Actions -->
      <div class="flex space-x-6 mt-3 text-sm text-gray-600">
        <button (click)="onLike($event)" class="flex items-center space-x-1 hover:text-red-500">
          <span>❤️</span>
          <span>{{ post?.likesCount ?? 0 }}</span>
        </button>

        <button (click)="onComment($event)" class="flex items-center space-x-1 hover:text-blue-600">
          <span>💬</span>
          <span>{{ post?.commentsCount ?? 0 }}</span>
        </button>
      </div>
    </div>

  </div>
</div>
