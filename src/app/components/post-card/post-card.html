<div #postRef [attr.data-id]="post?.id" (click)="onPostClick()" class="cursor-pointer">
  <div class="border rounded mb-6 bg-white shadow-sm overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between p-4">
        <div class="flex items-center space-x-3">
            <!-- Avatar -->
            <app-avatar [username]="post?.username" [imageUrl]="post?.userAvatar"></app-avatar>

            <!-- Username -->
            <h3 class="font-normal text-gray-800">{{ post?.username ?? "Unknown" }}</h3>
        </div>

      <span *ngIf="post?.isNew"
            class="ml-2 text-xs text-white bg-red-500 rounded-full px-2 py-0.5 transition-opacity duration-1000 ease-in-out"
            [class.opacity-0]="post?.fadingOut">
        New
      </span>
    </div>

    <!-- Media -->
    <div *ngIf="firstMediaUrl" class="bg-black">
      <img
        [src]="firstMediaUrl"
        class="w-full max-h-[500px] object-cover"
      />
    </div>

    <!-- Caption -->
    <div class="p-4">
      <p class="text-gray-700">{{ post?.caption }}</p>

      <!-- Actions -->
      <div class="flex space-x-6 mt-3 text-sm text-gray-600">
        <button (click)="onLike($event)" class="flex items-center space-x-1 hover:text-red-500">
          <span>❤️</span>
          <span>{{ post?.likesCount ?? 0 }}</span>
        </button>

        <button (click)="onComment($event)" class="flex items-center space-x-1 hover:text-blue-600">
          <span>💬</span>
          <span>{{ post?.commentsCount ?? 0 }}</span>
        </button>
      </div>
    </div>

  </div>
</div>
