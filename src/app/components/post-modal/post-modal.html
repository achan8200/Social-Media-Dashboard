<!-- Only render when there's a post -->
<div *ngIf="post && isVisible" @overlayFade class="fixed inset-0 flex items-center justify-center z-50 p-4">

  <!-- Close Button -->
  <button
    (click)="onClose()"
    class="absolute top-4 right-4 text-white text-xl font-bold z-50 hover:text-gray-300">
    ✕
  </button>

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/60"></div>

  <!-- Modal Card -->
  <div
    @modalScale
    class="relative bg-white transform w-full max-h-[90vh] rounded-lg overflow-hidden"
    [ngClass]="post.media?.length ? 'max-w-5xl' : 'max-w-2xl'"
  >

    <!-- Media Post -->
    <div *ngIf="post.media?.length; else captionOnlyLayout"
       class="flex md:flex-row flex-col h-full">

      <!-- Left: Media Carousel -->
      <div class="flex-1 bg-black flex items-center justify-center relative max-h-[60vh] md:max-h-[90vh] w-full">
        
        <!-- Carousel Track -->
        <div #carouselContainer
            class="w-full h-full overflow-hidden relative select-none"
            (mousedown)="dragStart($event)"
            (mousemove)="dragMove($event)"
            (mouseup)="dragEnd()"
            (mouseleave)="dragEnd()"
            (touchstart)="dragStart($event)"
            (touchmove)="dragMove($event)"
            (touchend)="dragEnd()">
          <div class="flex h-full"
              [style.transform]="'translateX(' + currentTranslate + 'px)'"
              [style.transition]="isDragging ? 'none' : 'transform 300ms ease-in-out'">
            <div *ngFor="let media of post.media"
                class="w-full flex-shrink-0 flex items-center justify-center bg-black">
              <img *ngIf="media.type === 'image'"
                  [src]="media.url"
                  class="max-w-full max-h-full object-contain"/>
              <video *ngIf="media.type === 'video'"
                    #videoPlayer
                    [src]="media.url"
                    class="max-w-full max-h-full object-contain"
                    [poster]="media.thumbnail"
                    loop
                    controls
                    playsinline
                    preload="metadata">
              </video>
            </div>
          </div>
        </div>

        <!-- Slide counter -->
        <div *ngIf="hasMultipleMedia()"
            class="absolute top-3 right-3 bg-black/60 text-white text-xs px-2 py-1 rounded-full">
          {{ currentMediaIndex + 1 }} / {{ post.media?.length }}
        </div>

        <!-- Left/Right Arrows -->
        <button *ngIf="hasMultipleMedia()"
                (click)="prevMedia()"
                [disabled]="currentMediaIndex === 0"
                class="absolute left-2 top-1/2 transform -translate-y-1/2 text-2xl
                      bg-black/40 text-white rounded-full w-8 h-8 flex 
                      items-center justify-center hover:bg-black/60
                      disabled:opacity-30 disabled:cursor-not-allowed">
          <span class="relative -top-[3px]">‹</span>
        </button>

        <button *ngIf="hasMultipleMedia()"
                (click)="nextMedia()"
                [disabled]="currentMediaIndex === ((post.media?.length ?? 0) - 1)"
                class="absolute right-2 top-1/2 transform -translate-y-1/2 text-2xl
                      bg-black/40 text-white rounded-full w-8 h-8 flex 
                      items-center justify-center hover:bg-black/60
                      disabled:opacity-30 disabled:cursor-not-allowed">
          <span class="relative -top-[3px]">›</span>
        </button>

        <!-- Pagination Dots -->
        <div *ngIf="hasMultipleMedia()" class="absolute bottom-2 left-1/2 transform -translate-x-1/2 flex space-x-1">
          <span *ngFor="let m of post.media; let i = index"
                class="w-2 h-2 rounded-full"
                [ngClass]="{'bg-white': i === currentMediaIndex, 'bg-white/50': i !== currentMediaIndex}">
          </span>
        </div>

      </div>

      <!-- Right: Details -->
      <div class="w-full md:w-96 p-4 flex flex-col overflow-y-auto max-h-[40vh] md:max-h-[90vh]">
        <div class="flex justify-between items-center mb-2">
          <div class="flex items-center space-x-3">
            <app-avatar [username]="username$ | async" [imageUrl]="userAvatar$ | async"></app-avatar>
            <span class="font-normal">{{ username$ | async }}</span>
          </div>
          <!-- Author Menu -->
          <div *ngIf="post.uid === auth.currentUser?.uid" class="relative">
            <button
              (click)="toggleMenu($event)"
              [class.bg-gray-300]="menuOpen"
              class="text-gray-600 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 hover:text-black transition">
              <span class="relative -top-[1px]">⋯</span>
            </button>

            <div *ngIf="menuOpen"
                class="absolute right-0 mt-2 w-40 bg-white border rounded shadow-lg z-50">
              <button (click)="onEdit($event)" class="block w-full text-left px-4 py-2 hover:bg-gray-100">
                Edit Post
              </button>
              <button (click)="onDelete($event)" class="block w-full text-left px-4 py-2 text-red-600 hover:bg-gray-100">
                Delete Post
              </button>
            </div>
          </div>
        </div>

        <p class="text-sm mb-4">{{ post.caption }}</p>

        <!-- Actions -->
        <div class="flex items-center space-x-6 mb-4 text-sm">

          <!-- Likes Count -->
          <button
            (click)="likePost()"
            class="text-red-500 font-medium flex items-center space-x-1">
            <span>❤️</span>
            <span>{{ post.likesCount }}</span>
          </button>

          <!-- Comments Count -->
          <div class="flex items-center space-x-1 text-gray-600">
            <span>💬</span>
            <span>{{ post.commentsCount }}</span>
          </div>
        </div>

        <!-- Comments Placeholder -->
        <div class="border-t pt-4 text-sm text-gray-500">
          Comments coming soon...
        </div>
      </div>
    </div>

    <!-- Caption-only Post -->
    <ng-template #captionOnlyLayout>
      <div class="flex flex-col justify-center p-8 w-full h-full text-left">

        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
          <div class="flex items-center space-x-3">
            <app-avatar
              [username]="username$ | async"
              [imageUrl]="userAvatar$ | async">
            </app-avatar>

            <span class="font-normal">
              {{ username$ | async }}
            </span>
          </div>

          <!-- Author Menu -->
          <div *ngIf="isAuthor" class="relative">
            <button
              (click)="toggleMenu($event)"
              [class.bg-gray-300]="menuOpen"
              class="text-gray-600 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 hover:text-black transition">
              <span class="relative -top-[1px]">⋯</span>
            </button>

            <div *ngIf="menuOpen"
                class="absolute right-0 mt-2 w-40 bg-white border rounded shadow-lg z-50">
              <button (click)="onEdit($event)" class="block w-full text-left px-4 py-2 hover:bg-gray-100">
                Edit Post
              </button>
              <button (click)="onDelete($event)" class="block w-full text-left px-4 py-2 text-red-600 hover:bg-gray-100">
                Delete Post
              </button>
            </div>
          </div>
        </div>

        <!-- Caption -->
        <p class="text-lg leading-relaxed mb-6 text-gray-800">
          {{ post.caption }}
        </p>

        <!-- Actions -->
        <div class="flex items-center space-x-6 mb-6 text-sm">

          <!-- Likes Count -->
          <button
            (click)="likePost()"
            class="text-red-500 font-medium flex items-center space-x-1">
            <span>❤️</span>
            <span>{{ post.likesCount }}</span>
          </button>

          <!-- Comments Count -->
          <div class="flex items-center space-x-1 text-gray-600">
            <span>💬</span>
            <span>{{ post.commentsCount }}</span>
          </div>
        </div>

        <!-- Comments placeholder -->
        <div class="border-t pt-4 text-sm text-gray-500">
          Comments coming soon...
        </div>
      </div>
    </ng-template>
  </div>
</div>
