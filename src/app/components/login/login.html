<div class="h-screen flex items-center justify-center px-4 overflow-hidden">

  <div class="w-full max-w-md bg-[var(--card)] backdrop-blur-2xl border border-[var(--border)] shadow-xl rounded-2xl p-10 space-y-6 -translate-y-10">

    <!-- App Title -->
    <div class="text-center">
      <h1 class="text-3xl font-bold text-[var(--text)]">Welcome Back</h1>
      <p class="text-[var(--text)] opacity-60 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="login()" class="space-y-4">

      <!-- Email -->
      <input
        type="email"
        class="w-full rounded-lg bg-[var(--form)] border border-[var(--border)] px-4 py-3
          text-[var(--text)] placeholder:text-[var(--text)]/40
          outline-none transition focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      />

      <!-- Password -->
      <div class="relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="w-full rounded-lg bg-[var(--form)] border border-[var(--border)] px-4 py-3 pr-12
            text-[var(--text)] placeholder:text-[var(--text)]/40
            outline-none transition focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
        />

        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute right-3 top-1/2 -translate-y-1/2 opacity-60 hover:opacity-100 transition-opacity"
        >
          <img 
            [src]="showPassword ? 'assets/icons/hide.svg' : 'assets/icons/show.svg'" 
            alt="Toggle password visibility"
            class="w-5 h-5"
            [style.filter]="'var(--icon-filter)'"
          />
        </button>
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="w-full rounded-lg py-3 font-semibold text-white
          bg-[var(--primary)]
          shadow-lg shadow-black/10
          hover:bg-[var(--primary-hover)] hover:scale-[1.01]
          active:scale-[0.99]
          transition-all duration-200"
      >
        Login
      </button>

    </form>

    <!-- Error -->
    <p *ngIf="error" class="text-red-500 text-sm text-center">
      {{ error }}
    </p>

    <!-- Signup Link -->
    <p class="text-center text-sm text-[var(--text)] opacity-60">
      Don't have an account?
      <a routerLink="/signup" class="ml-1 text-[var(--primary)] hover:underline font-medium">
        Create one
      </a>
    </p>

  </div>

</div>
