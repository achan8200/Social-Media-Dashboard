<div class="h-screen flex items-center justify-center px-4 overflow-hidden">

  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-10 space-y-6 -translate-y-10">

    <!-- App Title -->
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="login()" class="space-y-4">

      <!-- Email -->
      <input
        type="email"
        class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      />

      <!-- Password -->
      <div class="relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
        />

        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
        >
          <img 
            [src]="showPassword ? 'assets/icons/hide.svg' : 'assets/icons/show.svg'" 
            alt="Toggle password visibility"
            class="w-5 h-5"
          />
        </button>
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
      >
        Login
      </button>

    </form>

    <!-- Error -->
    <p *ngIf="error" class="text-red-500 text-sm text-center">
      {{ error }}
    </p>

    <!-- Signup Link -->
    <p class="text-center text-sm text-gray-500">
      Don't have an account?
      <a routerLink="/signup" class="text-blue-600 hover:underline font-medium">
        Create one
      </a>
    </p>

  </div>

</div>
