<section class="flex-1 p-6 space-y-6 relative text-[var(--text)]">

  <div class="flex items-center mb-4">
    <div class="flex bg-[var(--card)] p-1 rounded-full gap-1 text-sm border border-[var(--border)] shadow-lg">

      <button
        (click)="setFilter('forYou')"
        class="px-4 py-1.5 rounded-full transition"
        [ngClass]="feedFilter === 'forYou'
          ? 'bg-[var(--bg)] shadow font-semibold'
          : 'hover:bg-[var(--hover)]'"
      >
        For You
      </button>

      <button
        (click)="setFilter('latest')"
        class="px-4 py-1.5 rounded-full transition"
        [ngClass]="feedFilter === 'latest'
          ? 'bg-[var(--bg)] shadow font-semibold'
          : 'hover:bg-[var(--hover)]'"
      >
        Latest
      </button>

      <button
        (click)="setFilter('following')"
        class="px-4 py-1.5 rounded-full transition"
        [ngClass]="feedFilter === 'following'
          ? 'bg-[var(--bg)] shadow font-semibold'
          : 'hover:bg-[var(--hover)]'"
      >
        Following
      </button>

    </div>
  </div>

  <div *ngIf="selectedTag$ | async as tag" class="mb-3">
    <div class="inline-flex items-center gap-2 bg-[var(--primary)] text-gray-100 px-3 py-1 rounded-full 
      text-sm border border-[var(--border)]">
      <span>{{ tag }}</span>

      <button
        (click)="clearTag()"
        class="hover:opacity-70 font-bold"
      >
        ✕
      </button>
    </div>
  </div>

  <!-- Shimmer loader -->
  <div *ngIf="showShimmer" class="space-y-4">
    <div *ngFor="let i of [1,2,3,4]" class="animate-pulse bg-[var(--card)] p-4 rounded-2xl border border-[var(--border)] space-y-3">
      <div class="h-4 bg-[var(--hover)] opacity-30 rounded w-1/3"></div>
      <div class="h-3 bg-[var(--hover)] opacity-30 rounded w-2/3"></div>
      <div class="h-40 bg-[var(--hover)] opacity-20 rounded"></div>
    </div>
  </div>

  <!-- Feed Posts -->
  <div [class.hidden]="showShimmer">
    <div *ngFor="let post of posts$ | async; trackBy: trackByPostId" #postRef [attr.data-id]="post.id">
      <app-post-card
        [post]="post"
        [feedPaused]="feedPaused"
        (openPost)="openPostModal($event)"
        (like)="likePost($event)"
        (edit)="onEditPost($event)"
        (deletePost)="onDeletePost($event)"
        (removePostFromGroup)="onRemovePostFromGroup($event)">
      </app-post-card>
    </div>
  </div>

  <!-- Floating Create Button -->
  <button
    *ngIf="!(isGuest$ | async)"
    (click)="openCreateModal()"
    class="floating-create-button"
  >
    <span class="relative -top-0.5">+</span>
  </button>

  <!-- Create Post Modal -->
  <app-create-post-modal
    *ngIf="showCreateModal"
    (close)="closeCreateModal()">
  </app-create-post-modal>

  <!-- Post View Modal -->
  <app-post-modal
    *ngIf="selectedPost"
    [post]="selectedPost"
    (close)="closePostModal()">
  </app-post-modal>

</section>

<!-- Confirm Modal for Post Deletion -->
<app-confirm-modal
  *ngIf="selectedPostToDelete"
  title="Delete this post?"
  message="This action cannot be undone."
  confirmText="Delete"
  cancelText="Cancel"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-confirm-modal>

<!-- Confirm Modal for Remove from Group -->
<app-confirm-modal
  *ngIf="selectedPostToRemoveFromGroup"
  [title]="'Remove from ' + (selectedPostToRemoveFromGroup.groupName + '?' || 'this group?')"
  message="This post will no longer appear in the group feed."
  confirmText="Remove"
  cancelText="Cancel"
  (confirmed)="confirmRemoveFromGroup()"
  (cancelled)="cancelRemoveFromGroup()">
</app-confirm-modal>

<!-- Edit Post Modal -->
<app-edit-post-modal
  *ngIf="editingPost"
  [post]="editingPost"
  (update)="updatePost($event)"
  (cancel)="cancelEdit()">
</app-edit-post-modal>
