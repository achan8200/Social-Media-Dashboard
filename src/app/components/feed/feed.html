<section class="flex-1 p-6 space-y-6 relative">

  <!-- Header -->
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-bold text-gray-800">Home</h2>
  </div>

  <!-- Feed Posts -->
  <div *ngFor="let post of posts$ | async" #postRef [attr.data-id]="post.id">
    <app-post-card
      [post]="post"
      (openPost)="openPostModal($event)"
      (like)="likePost($event)"
      (comment)="commentPost($event)">
    </app-post-card>
  </div>

  <!-- Floating Create Button -->
  <button
    (click)="openCreateModal()"
    class="fixed bottom-8 right-8 w-14 h-14 bg-blue-600 text-white text-3xl rounded-full shadow-lg hover:scale-105 transition
          flex items-center justify-center leading-none"
  >
    <span class="relative -top-0.5">+</span>
  </button>

  <!-- Create Post Modal -->
  <app-create-post
    *ngIf="showCreateModal"
    (close)="closeCreateModal()">
  </app-create-post>

  <!-- Post View Modal -->
  <app-post-modal
    *ngIf="selectedPost"
    [post]="selectedPost"
    (close)="closePostModal()">
  </app-post-modal>

</section>
