<aside
  class="w-64 hidden md:block rounded-3xl border border-[var(--border)]
         bg-[var(--card)] backdrop-blur-2xl shadow-xl
         text-[var(--text)] overflow-hidden"
>
  <div class="p-4">

    <!-- Navigation -->
    <nav class="space-y-1.5">

      <!-- Home -->
      <a
        routerLink="/home"
        routerLinkActive="bg-[var(--hover)] text-[var(--text)] shadow-sm"
        class="group flex items-center gap-3 rounded-2xl px-4 py-3
               transition-all duration-200
               hover:bg-[var(--hover)]"
      >
        <img
          src="assets/icons/home.svg"
          alt="Home"
          class="w-5 h-5 opacity-80 group-hover:opacity-100 transition"
          [style.filter]="'var(--icon-filter)'"
        />

        <span class="font-medium">
          Home
        </span>
      </a>

      <!-- Messages -->
      <a
        routerLink="/messages"
        routerLinkActive="bg-[var(--hover)] text-[var(--text)] shadow-sm"
        class="group flex items-center gap-3 rounded-2xl px-4 py-3
               transition-all duration-200
               hover:bg-[var(--hover)]"
      >
        <img
          src="assets/icons/message.svg"
          alt="Messages"
          class="w-5 h-5 opacity-80 group-hover:opacity-100 transition"
          [style.filter]="'var(--icon-filter)'"
        />

        <span class="font-medium">
          Messages
        </span>
      </a>

      <!-- Notifications -->
      <a
        routerLink="/notifications"
        routerLinkActive="bg-[var(--hover)] text-[var(--text)] shadow-sm"
        class="group flex items-center gap-3 rounded-2xl px-4 py-3
               transition-all duration-200
               hover:bg-[var(--hover)]"
      >
        <img
          src="assets/icons/notification.svg"
          alt="Notifications"
          class="w-5 h-5 opacity-80 group-hover:opacity-100 transition"
          [style.filter]="'var(--icon-filter)'"
        />

        <span class="font-medium">
          Notifications
        </span>
      </a>

      <!-- Connections -->
      <a
        routerLink="/connections"
        routerLinkActive="bg-[var(--hover)] text-[var(--text)] shadow-sm"
        class="group flex items-center gap-3 rounded-2xl px-4 py-3
               transition-all duration-200
               hover:bg-[var(--hover)]"
      >
        <img
          src="assets/icons/friends.svg"
          alt="Connections"
          class="w-5 h-5 opacity-80 group-hover:opacity-100 transition"
          [style.filter]="'var(--icon-filter)'"
        />

        <span class="font-medium">
          Connections
        </span>
      </a>

      <!-- Groups -->
      <a
        routerLink="/groups"
        routerLinkActive="bg-[var(--hover)] text-[var(--text)] shadow-sm"
        class="group flex items-center gap-3 rounded-2xl px-4 py-3
               transition-all duration-200
               hover:bg-[var(--hover)] "
      >
        <img
          src="assets/icons/united.svg"
          alt="Groups"
          class="w-5 h-5 opacity-80 group-hover:opacity-100 transition"
          [style.filter]="'var(--icon-filter)'"
        />

        <span class="font-medium">
          Groups
        </span>
      </a>

    </nav>

  </div>
</aside>
