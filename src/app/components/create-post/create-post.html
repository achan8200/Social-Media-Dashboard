<div class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
  <div class="bg-white w-full max-w-lg rounded-lg p-4 flex flex-col space-y-4">
    <div class="flex justify-between items-center">
      <h3 class="font-semibold text-lg">New Post</h3>
      <button (click)="close.emit()">✕</button>
    </div>

    <textarea [(ngModel)]="caption" placeholder="What's on your mind?" class="w-full border rounded p-2" rows="4"></textarea>

    <input type="file" multiple (change)="onFileChange($event)" class="text-sm" />

    <!-- Preview Grid -->
    <div *ngIf="selectedMedia.length > 0" class="grid grid-cols-3 gap-2 mt-2">
        <div *ngFor="let media of selectedMedia; let i = index" class="relative border rounded overflow-hidden">

            <!-- Remove button -->
            <button 
                (click)="removeMedia(i)"
                class="absolute top-1 right-1 bg-black bg-opacity-60 text-white text-xs px-1 rounded">
                ✕
            </button>

            <!-- Image Preview -->
            <img *ngIf="media.file.type.startsWith('image')" 
                [src]="media.previewUrl" 
                class="w-full h-24 object-cover" />

            <!-- Video Preview -->
            <video *ngIf="media.file.type.startsWith('video')" 
                [src]="media.previewUrl"
                class="w-full h-24 object-cover"
                muted>
            </video>

            <!-- Progress Bar -->
            <div *ngIf="media.progress > 0 && media.progress < 100"
                class="absolute bottom-0 left-0 w-full bg-gray-200 h-1">
            <div class="bg-blue-500 h-1"
                [style.width.%]="media.progress">
            </div>
            </div>

        </div>
    </div>

    <div class="flex justify-end space-x-2">
      <button (click)="close.emit()" class="px-4 py-2 bg-gray-200 rounded">Cancel</button>
      <button (click)="onCreate()" class="px-4 py-2 bg-blue-500 text-white rounded">Post</button>
    </div>
  </div>
</div>
