<!-- Fixed Gradient Background -->
<div
  class="fixed inset-0 -z-10 app-gradient">
</div>

<!-- App -->
<div class="min-h-screen flex flex-col">
  <!-- Navbar -->
  <app-navbar class="sticky top-0 z-50"></app-navbar>

  <!-- Main Layout -->
  <div class="flex flex-col md:flex-row flex-1 px-4 py-3 gap-4 max-w-7xl mx-auto w-full">
    <!-- Left Sidebar -->
    <app-sidebar class="w-full md:w-64 sticky top-20 self-start"></app-sidebar>

    <!-- Route Content -->
    <div class="flex-1">
      <router-outlet *ngIf="authService.authReady$ | async"></router-outlet>
    </div>
  </div>
</div>

<!-- Global Toast -->
<app-toast></app-toast>
